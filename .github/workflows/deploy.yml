name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd apps/web-next && npm ci --legacy-peer-deps

      - name: Typecheck Worker API
        run: npm run typecheck

      - name: Lint Worker API
        run: npm run lint

      - name: Test Worker API
        run: npm run test

      - name: Lint frontend
        run: npm run web:lint

  deploy:
    needs: quality
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd apps/web-next && npm ci --legacy-peer-deps

      - name: Build Worker (Backend API)
        run: npm run build

      - name: Deploy Worker to Cloudflare
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            IPBOT_API_KEY
            IPINFO_TOKEN
            CLOUDFLARE_RADAR_TOKEN
            ABUSEIPDB_API_KEY
        env:
          IPBOT_API_KEY: ${{ secrets.IPBOT_API_KEY }}
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
          CLOUDFLARE_RADAR_TOKEN: ${{ secrets.CLOUDFLARE_RADAR_TOKEN }}
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}

      - name: Build frontend
        run: npm run web:build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy Frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web-next/out --project-name=iphey --branch=${{ github.ref_name }}
